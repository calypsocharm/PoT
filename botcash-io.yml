http:
  routers:
    botcash-io-http:
      rule: "Host(`botcash.io`) || Host(`www.botcash.io`)"
      entryPoints:
        - web
      middlewares:
        - https-redirect
      service: botcash-io-service
    botcash-io-https:
      rule: "Host(`botcash.io`) || Host(`www.botcash.io`)"
      entryPoints:
        - websecure
      service: botcash-io-service
      tls:
        certResolver: letsencrypt
  middlewares:
    https-redirect:
      redirectScheme:
        scheme: https
        permanent: true
  services:
    botcash-io-service:
      loadBalancer:
        servers:
          - url: "http://172.17.0.1:80"
